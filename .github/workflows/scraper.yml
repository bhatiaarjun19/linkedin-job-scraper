name: LinkedIn Job Scraper

on:
  schedule:
    # Runs every 2 hours between 7 AM - 10 PM EST
    # EST is UTC-5, so 7 AM EST = 12:00 UTC, 10 PM EST = 03:00 UTC next day
    # Schedule: 7 AM, 9 AM, 11 AM, 1 PM, 3 PM, 5 PM, 7 PM, 9 PM EST
    - cron: '0 12,14,16,18,20,22 * * *'    # 7 AM, 9 AM, 11 AM, 1 PM, 3 PM, 5 PM EST
    - cron: '0 0,2 * * *'                  # 7 PM, 9 PM EST (next day UTC)
  
  # Allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
        
    - name: Run scraper
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECIPIENT_EMAIL: prachita892@gmail.com
      run: |
        python scraper.py
        
    - name: Commit and push if database changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add jobs_database.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update jobs database - $(date)" && git push)
