name: LinkedIn Job Scraper

on:
  schedule:
    # Runs every 30 minutes between 7 AM - 10 PM EST (12:00 - 03:00 UTC next day)
    # EST is UTC-5, so 7 AM EST = 12:00 UTC, 10 PM EST = 03:00 UTC next day
    - cron: '0,30 12-23 * * *'    # 7 AM - 11:30 PM EST (12:00-23:30 UTC same day)
    - cron: '0,30 0-3 * * *'      # 12:00 AM - 3:00 AM EST (05:00-08:00 UTC same day = 12AM-3AM EST previous day)
  
  # Allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
        
    - name: Run scraper
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: |
        python scraper.py
        
    - name: Commit and push if database changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add jobs_database.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update jobs database - $(date)" && git push)
